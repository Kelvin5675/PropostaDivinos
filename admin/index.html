<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divinos Admin | Acesso Premium</title>
    <link rel="shortcut icon" href="../images/Logo Official 2019 E 2024Cor caregada.png" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Syne:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #e63946;
            --secondary: #1d3557;
            --accent: #d4af37;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #1d3557 0%, #0a1118 100%);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(120px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .bg-blob:nth-child(1) {
            top: -100px;
            left: -100px;
        }

        .bg-blob:nth-child(2) {
            bottom: -100px;
            right: -100px;
            background: var(--accent);
            animation-delay: -5s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(100px, 50px) scale(1.1);
            }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            perspective: 1000px;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) rotateX(-5deg);
            }

            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .logo-wrapper {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 22px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .logo-wrapper img {
            width: 70%;
            object-fit: contain;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p.subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.5rem;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.1);
        }

        .form-group input:focus+i {
            color: var(--primary);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(230, 57, 70, 0.4);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-container {
            background: rgba(255, 235, 235, 0.9);
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            text-align: left;
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        .error-container span {
            color: #c0392b;
            font-size: 0.85rem;
            display: block;
        }

        footer {
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrapper">
                <img src="../images/Logo Official 2019 E 2024Cor caregada.png" alt="Logo">
            </div>
            <h1>Painel de Controle</h1>
            <p class="subtitle">Acesse para gerenciar sua loja digital</p>

            <div id="error-container" class="error-container">
                <span id="error-msg">Email ou senha incorretos</span>
            </div>

            <form id="login-form">
                <div id="auth-step-1">
                    <div class="form-group">
                        <label>Email Corporativo</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="nome@exemplo.com" required>
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Senha de Acesso</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>
                </div>

                <div id="auth-step-2" style="display: none;">
                    <div class="form-group">
                        <label>Código Google Authenticator</label>
                        <div class="input-wrapper">
                            <input type="text" id="2fa-code" placeholder="000 000" maxlength="6" inputmode="numeric">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <p style="font-size: 0.75rem; color: #666; margin-top: 10px; text-align: center;">Digite o
                            código de 6 dígitos gerado no seu app.</p>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submit-btn" style="margin-top: 1rem;">
                    <span>Entrar no Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <button type="button" id="back-btn" class="btn-login"
                    style="margin-top: 0.5rem; background: #eee; color: #444; box-shadow: none; display: none;">
                    <i class="fas fa-arrow-left"></i>
                    <span>Voltar</span>
                </button>
            </form>
        </div>

        <center>
            <footer>&copy; 2025 Divinos Graffic • Secure Admin Access</footer>
        </center>
    </div>

    <!-- Supabase & Data Loader -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js?v=11"></script>
    <script src="../js/data-loader.js?v=11"></script>

    <!-- TOTP Library for 2FA -->
    <script src="https://unpkg.com/@otplib/preset-browser@^12.0.0/buffer.js"></script>
    <script src="https://unpkg.com/@otplib/preset-browser@^12.0.0/index.js"></script>

    <script>
        // Local shortcut for otplib
        const getOtplib = () => window.otplib || window['otplib-browser'];

        const loginForm = document.getElementById('login-form');
        const errorContainer = document.getElementById('error-container');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');
        const step1 = document.getElementById('auth-step-1');
        const step2 = document.getElementById('auth-step-2');
        const backBtn = document.getElementById('back-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (step2.style.display === 'none') {
                // ETAPA 1: Login com Email/Senha
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                errorContainer.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';

                try {
                    const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    // Verificar se MFA está habilitado nas configurações do site
                    const { data: mfaSet } = await window.supabaseClient.from('site_settings').select('value').eq('key', 'admin_2fa_enabled').single();

                    if (mfaSet && mfaSet.value === 'true') {
                        // Trocar para etapa 2
                        step1.style.display = 'none';
                        step2.style.display = 'block';
                        backBtn.style.display = 'flex';
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<span>Verificar Código</span> <i class="fas fa-check"></i>';
                        document.getElementById('2fa-code').focus();
                    } else {
                        // Sem 2FA, entra direto
                        window.location.href = '/admin/dashboard.html';
                    }
                } catch (err) {
                    errorMsg.textContent = err.message === "Invalid login credentials"
                        ? "Email ou senha incorretos."
                        : "Erro: " + err.message;
                    errorContainer.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Entrar no Sistema</span> <i class="fas fa-arrow-right"></i>';
                }
            } else {
                // ETAPA 2: Validação TOTP (Google Authenticator)
                const code = document.getElementById('2fa-code').value;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validando...';

                try {
                    const { data: secretSet } = await window.supabaseClient.from('site_settings').select('value').eq('key', 'admin_2fa_secret').single();
                    const secret = secretSet ? secretSet.value : '';

                    if (!secret) {
                        // Se não houver segredo mas 2FA estiver ON, deixa passar mas avisa no console
                        window.location.href = 'dashboard.html';
                        return;
                    }

                    // Valida o código
                    const lib = getOtplib();
                    if (!lib || !lib.authenticator) {
                        throw new Error("Erro de carregamento da proteção 2FA. Recarregue a página.");
                    }

                    const isValid = lib.authenticator.check(code, secret);
                    if (isValid) {
                        window.location.href = '/admin/dashboard.html';
                    } else {
                        throw new Error("Código 2FA incorreto ou expirado.");
                    }
                } catch (err) {
                    errorMsg.textContent = err.message;
                    errorContainer.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Verificar Código</span> <i class="fas fa-check"></i>';
                }
            }
        });

        backBtn.addEventListener('click', () => {
            step2.style.display = 'none';
            step1.style.display = 'block';
            backBtn.style.display = 'none';
            submitBtn.innerHTML = '<span>Entrar no Sistema</span> <i class="fas fa-arrow-right"></i>';
            errorContainer.style.display = 'none';
        });

        // Verificar sessão existente
        async function checkSession() {
            if (!window.supabaseClient) return;
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) {
                // Se já tem sessão de uma aba aberta, manda pro dashboard
                window.location.href = '/admin/dashboard.html';
            }
        }
        checkSession();
    </script>
</body>

</html>
